elevation_mapping:
  ros__parameters:
  
    postprocessor_pipeline: # set by postprocessor_pipeline_name
      # Inpaint disabled: OpenCV 4.5/4.6 conflict on robot causes SIGSEGV in cv::inpaint
      # filter1:
      #   name: inpaint
      #   type: gridMapCv/InpaintFilter
      #   params:
      #     input_layer: elevation
      #     output_layer: elevation_inpainted
      #     radius: 0.05

      # Compute Surface normals (uses elevation directly since inpaint is disabled)
      filter2:
        name: surface_normals
        type: gridMapFilters/NormalVectorsFilter
        params:
          input_layer: elevation
          output_layers_prefix: normal_vectors_
          radius: 0.1
          normal_vector_positive_axis: z

      #  Delete layers that are not needed to reduce bandwidth
      # filter3:
      #   name: delete_original_layers
      #   type: gridMapFilters/DeletionFilter
      #   params:
      #     layers: [lowest_scan_point,sensor_x_at_lowest_scan, sensor_y_at_lowest_scan, sensor_z_at_lowest_scan] # List of layers.
